<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Student Dropout Prediction System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <style>

        body{
            background:#f4f8f5;
            font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
            min-height:100vh;
            display:flex;
            flex-direction:column;
        }

        .navbar{
            background:linear-gradient(90deg,#146c43,#198754);
            box-shadow:0 3px 15px rgba(0,0,0,.15);
        }

        .navbar-brand{
            font-size:22px;
            font-weight:bold;
            color:white !important;
        }

        .navbar-brand i{
            margin-right:8px;
        }

        .nav-btn{
            border-radius:30px;
            font-weight:600;
            padding:8px 20px;
            margin-left:10px;
        }

        .content{
            flex:1;
            margin-top:40px;
            margin-bottom:50px;
        }

        .card{
            border:none;
            border-radius:18px;
            box-shadow:0 10px 25px rgba(0,0,0,.08);
        }

        .card-header{
            background:linear-gradient(90deg,#198754,#20c997);
            color:white;
            border-radius:18px 18px 0 0 !important;
            font-size:22px;
            font-weight:bold;
            padding:18px;
        }

        .page-title{
            color:#146c43;
            font-weight:bold;
            margin-bottom:20px;
        }

        .btn-success{
            background:#198754;
            border:none;
        }

        .btn-success:hover{
            background:#157347;
        }

        .table thead{
            background:#198754;
            color:white;
        }

        .alert-success{
            border-left:5px solid #198754;
        }

        footer{
            margin-top:auto;
            background:#146c43;
            color:white;
            text-align:center;
            padding:20px;
        }

        footer p{
            margin:0;
        }

    </style>

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark">

    <div class="container">

        <a class="navbar-brand" href="{% url 'welcome' %}">

            <i class="fas fa-user-graduate"></i>

            Student Dropout Prediction System

        </a>

        <div class="d-flex">

            <a href="{% url 'welcome' %}"
               class="btn btn-outline-light nav-btn">

                <i class="fas fa-house"></i>

                Home

            </a>

            <a href="{% url 'home' %}"
               class="btn btn-light nav-btn">

                <i class="fas fa-chart-line"></i>

                Prediction

            </a>

            <a href="{% url 'history' %}"
               class="btn btn-warning nav-btn">

                <i class="fas fa-clock-rotate-left"></i>

                History

            </a>

        </div>

    </div>

</nav>

<div class="container content">

    {% block content %}

    {% endblock %}

</div>

<footer>

    <div class="container">

        <h5 class="mb-2">
            Student Dropout Prediction System
        </h5>

        <p>
            Machine Learning Powered Academic Success Prediction
        </p>

        <small>
            Developed using Django, Scikit-Learn, Random Forest, Bootstrap 5 and MySQL
        </small>

        <br>

        <small>
            © 2026 All Rights Reserved
        </small>

    </div>

</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
